name: ci-android
on:
  push: { paths: ["android/**"] }
  pull_request: { paths: ["android/**"] }
# One live run per ref; a new push cancels the superseded run instead of
# letting a wedged gradle invocation occupy a runner for 6 h.
concurrency:
  group: ci-android-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults: { run: { working-directory: android } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17, cache: gradle }
      - run: ./gradlew :app:lintDebug
      - run: ./gradlew :app:testDebugUnitTest
      - run: ./gradlew :app:assembleDebug
      # APK size budget (NFR-1, backlog 5.2). Guards against accidental bloat
      # (e.g. an oversized bundled asset). Budget is on the unminified debug APK;
      # the release build ships smaller. Raise deliberately if a real feature needs it.
      - name: APK size budget
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          BUDGET=$((20 * 1024 * 1024))   # 20 MiB
          SIZE=$(stat -c%s "$APK")
          echo "debug APK: $SIZE bytes (budget $BUDGET)"
          if [ "$SIZE" -gt "$BUDGET" ]; then
            echo "::error::debug APK $SIZE bytes exceeds budget $BUDGET (NFR-1)"; exit 1
          fi
      # TODO(M6): Play publish on tags (release.yml); macrobenchmark cold-start
      # ≤2.5s + baseline profile need an emulator/device (deferred from 5.2).
